networks:
  internal:
    internal: true

volumes:
  db_data:

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: mangacollector
      POSTGRES_PASSWORD: mangacollectormangacollector
      POSTGRES_DB: mangacollector
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  traefik:
    image: traefik:v2
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "12000:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
      - internal

  server:
    build: ./server
    image: dim145/mangacollector-back:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=PathPrefix(`/api`) || PathPrefix(`/auth`)"
      - "traefik.http.services.server.loadbalancer.server.port=3000"
    ports:
      - "3000:3000"
    # Hardening — binary runs as uid 65532, needs no capabilities and writes
    # only to /data (mounted volume) + /tmp (tmpfs). Root FS stays read-only.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    environment:
      NODE_ENV: "production"
      PORT: 3000
      AUTH_MODE: openidconnect
      AUTH_ISSUER: https://xxx/
      AUTH_ISSUER_BASE_PATH: /api/v1/oauth/
      AUTH_CLIENT_ID: xxx
      AUTH_CLIENT_SECRET: xxx
      SESSION_SECRET: "xxx"
      FRONTEND_URL: http://localhost:12000
      POSTGRES_URL: postgres://mangacollector:mangacollectormangacollector@db:5432/mangacollector?sslmode=disable
      STORAGE_DIR: /data
    volumes:
      - ./tmp/docker-data:/data
    networks:
      - internal
      - default

  client:
    build: ./client
    image: dim145/mangacollector-front:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=PathPrefix(`/`)"
      - "traefik.http.services.client.loadbalancer.server.port=80"
    # Hardening — nginx pid + temp paths are redirected to /tmp in nginx.conf,
    # so the root FS can be read-only. Keep NET_BIND_SERVICE so the master
    # process can still bind port 80 inside the container.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=16m
    environment:
      FRONTEND_URL: http://localhost:12000
    ports:
      - "5173:80"
