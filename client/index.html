<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Theme bootstrap — runs synchronously BEFORE the stylesheet loads and
      BEFORE the body is parsed. Reads the user's saved preference from
      localStorage (same key as lib/theme.js) and flips the `data-theme`
      attribute on <html>. The stylesheet then applies the right palette
      on its very first paint — zero flash.

      Also sets colorScheme and a placeholder background-color on <html>
      so the gap between HTML parse and stylesheet apply stays the right
      shade instead of default white.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("mc:theme") || "dark";
          var resolved =
            stored === "auto"
              ? window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark"
              : stored === "light"
                ? "light"
                : "dark";
          var root = document.documentElement;
          if (resolved === "light") {
            root.setAttribute("data-theme", "light");
          }
          root.style.colorScheme = resolved;
          root.style.backgroundColor =
            resolved === "light" ? "#ffffff" : "#15100f";
        } catch (_) {
          /* fallback: dark stays as default */
        }
      })();
    </script>

    <!--
      季節 Season bootstrap — runs alongside the theme bootstrap so the
      ambient-glows are tinted correctly on the very first paint.
      "auto" (the default) resolves to the current astronomical season
      from the actual equinox / solstice dates, taking the user's
      hemisphere into account — so a Buenos Aires visitor's "spring"
      tint kicks in late September, not late March. An explicit choice
      ("spring"/"summer"/"autumn"/"winter"/"neutral") takes precedence.
      "neutral" leaves no attribute, which falls back to the base
      palette in index.css.

      The astronomical computation here mirrors `client/src/lib/season.js`
      so the inline bootstrap (which runs before any JS chunk loads) and
      the runtime helper agree on the same boundary date — no flash where
      the page first renders winter but flips to spring two seconds later.
    -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("mc:season") || "auto";
          var season = null;
          if (pref === "neutral") {
            season = null;
          } else if (
            pref === "spring" ||
            pref === "summer" ||
            pref === "autumn" ||
            pref === "winter"
          ) {
            season = pref;
          } else {
            // Auto / unset — astronomical equinox / solstice via Meeus
            // mean coefficients (precision ±20 min, far enough below
            // day resolution).
            var COEFS = {
              march: [2451623.80984, 365242.37404, 0.05169, -0.00411, -0.00057],
              june: [2451716.56767, 365241.62603, 0.00325, 0.00888, -0.0003],
              september: [2451810.21715, 365242.01767, -0.11575, 0.00337, 0.00078],
              december: [2451900.05952, 365242.74049, -0.06223, -0.00823, 0.00032],
            };
            var jdeMs = function (event, year) {
              var c = COEFS[event];
              var Y = (year - 2000) / 1000;
              var jde = c[0] + c[1] * Y + c[2] * Y * Y + c[3] * Y * Y * Y + c[4] * Y * Y * Y * Y;
              return (jde - 2440587.5) * 86400000;
            };
            var now = new Date();
            var t = now.getTime();
            var y = now.getUTCFullYear();
            var nh;
            if (t < jdeMs("march", y)) nh = "winter";
            else if (t < jdeMs("june", y)) nh = "spring";
            else if (t < jdeMs("september", y)) nh = "summer";
            else if (t < jdeMs("december", y)) nh = "autumn";
            else nh = "winter";

            // Hemisphere — keep the inline pattern list short; the JS
            // module has a richer set, the bootstrap only needs to nail
            // the major populated southern zones.
            var south = false;
            try {
              var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
              south = /^(Antarctica|Australia|Pacific\/(Auckland|Chatham|Easter|Fiji|Tahiti|Tongatapu|Norfolk|Apia)|America\/(Argentina|Asuncion|La_Paz|Lima|Manaus|Montevideo|Punta_Arenas|Santiago|Sao_Paulo|Bahia|Recife|Maceio|Fortaleza|Belem|Cuiaba|Campo_Grande|Boa_Vista|Rio_Branco)|Africa\/(Antananarivo|Blantyre|Bujumbura|Gaborone|Harare|Johannesburg|Kigali|Lubumbashi|Lusaka|Maputo|Maseru|Mbabane|Windhoek)|Atlantic\/(Stanley|St_Helena)|Indian\/(Antananarivo|Mauritius|Mahe|Reunion))(\/|$)/.test(
                tz,
              );
            } catch (_) {
              south = false;
            }
            var FLIP = { spring: "autumn", summer: "winter", autumn: "spring", winter: "summer" };
            season = south ? FLIP[nh] : nh;
          }
          if (season) {
            document.documentElement.setAttribute("data-season", season);
          }
        } catch (_) {
          /* no-op — base palette stays in charge */
        }
      })();
    </script>

    <!--
      時 Time-of-day bootstrap — sets `data-tod` on <html> before
      first paint so the additive haze tint (defined in index.css
      via `:root[data-tod="…"]`) lands on frame 0. The drift is
      subtle, so a delayed apply wouldn't be visually disastrous,
      but matching the season + theme bootstraps' hot-path style
      keeps the chrome consistent across all four atmospheric
      attributes.

      Mirrors `useTimeOfDay.js`'s bracket boundaries — keep them
      in sync. Six brackets covering night/dawn/morning/noon/
      afternoon/dusk based on continental sunrise-sunset windows.
    -->
    <script>
      (function () {
        try {
          var d = new Date();
          var h = d.getHours() + d.getMinutes() / 60;
          var tod;
          if (h < 4.5) tod = "night";
          else if (h < 7.5) tod = "dawn";
          else if (h < 11) tod = "morning";
          else if (h < 14) tod = "noon";
          else if (h < 17.5) tod = "afternoon";
          else if (h < 20) tod = "dusk";
          else tod = "night";
          document.documentElement.setAttribute("data-tod", tod);
        } catch (_) {
          /* no-op — base palette stays in charge */
        }
      })();
    </script>

    <!--
      朱 Accent bootstrap — runs synchronously here (NOT inside the
      deferred `main.jsx` module) so the `data-accent` attribute is on
      <html> before any stylesheet layout paints. Without this, the
      page renders one frame with the default hanko red, then `main.jsx`
      lands and applies the user's accent → visible flash.

      Mirrors the lib/accent.js logic minus validation — an unknown
      stored value simply doesn't match any `:root[data-accent="…"]`
      rule, falling back gracefully to the baked-in shu/hanko palette.
    -->
    <script>
      (function () {
        try {
          var accent = localStorage.getItem("mc:accent");
          if (accent && accent !== "shu") {
            document.documentElement.setAttribute("data-accent", accent);
          }
        } catch (_) {
          /* private mode / quota — base palette stays in charge */
        }
      })();
    </script>

    <!--
      設 · Runtime config injection — Umami analytics.
      The `${...}` placeholders are substituted by `envsubst` at the
      nginx container's startup (see `client/docker-entrypoint.sh`).
      When the operator hasn't set the env vars they resolve to empty
      strings, and the frontend's analytics module skips Umami init
      gracefully. This synchronous path means Umami pageviews are
      tracked from the very first navigation — no blocking fetch, no
      blind spot, even on a brand-new install with no SW cache.

      Sentry/Bugsink config takes a different path (async fetch from
      `/api/public-config`) — see `lib/publicConfig.js` for why.
    -->
    <script>
      window.__APP_CONFIG__ = {
        umami: {
          scriptUrl: "${FRONTEND_UMAMI_SCRIPT_URL}",
          websiteId: "${FRONTEND_UMAMI_WEBSITE_ID}",
        },
      };
    </script>

    <link rel="icon" type="image/svg+xml" href="./src/assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#161012" />
    <meta
      name="description"
      content="MangaCollector — archive, curate and cherish your manga library volume by volume."
    />
    <meta name="color-scheme" content="dark light" />

    <!-- iOS Safari PWA install support — "Add to home screen" launches in
         standalone mode with matching splash tint and status bar style. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MangaCollector" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- 字 · Font loading strategy.
         The Google Fonts stylesheet is large (4 families × multiple
         weights × italic axes for Fraunces). Loading it as a regular
         `rel=stylesheet` blocks the browser's render-blocking
         resource pipeline until the CSS is parsed — pushing the
         first paint of every page back by however long Google's CDN
         takes to respond.
         The `media="print" + onload` trick downloads the CSS as a
         non-render-blocking resource (the browser thinks it's only
         needed for print), then promotes it to all media once
         loaded. Combined with `&display=swap` already in the URL,
         the page renders immediately with the fallback stack and
         swaps to the custom faces as soon as they're parsed —
         exactly the behaviour we want.
         The `<noscript>` mirrors the request synchronously for
         users with JS disabled, so they still get the typography
         (just with the original blocking behaviour). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>MangaCollector — Your personal manga archive</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
