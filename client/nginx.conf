# Redirect every writable path into /tmp so the container can run with a
# read-only root filesystem (see docker-compose `read_only: true`).
pid /tmp/nginx.pid;

events{}

http {
    include /etc/nginx/mime.types;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    scgi_temp_path        /tmp/nginx-scgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;

    # Nginx doesn't know about webmanifest by default — add it explicitly so
    # PWA manifests ship with the right Content-Type.
    types {
        application/manifest+json webmanifest;
    }

    # Gzip every text-ish resource. Alpine nginx ships without brotli; gzip
    # already cuts ~70% off JS/CSS at comp_level 6.
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        application/rss+xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 80;
        server_name localhost;
        # The dist is mirrored to /tmp/html at container startup so the
        # `index.html` template pass (envsubst, see docker-entrypoint.sh)
        # can rewrite the file in place under a writable mount —
        # `/usr/share/nginx/html` lives on the read-only rootfs.
        root /tmp/html;
        index index.html;

        # ── Security response headers ───────────────────────────────────
        # Applied to every response via `always` so they ride along with
        # 4xx/5xx errors too (nginx's default `add_header` only fires on
        # 2xx/3xx, which misses the one moment you care most about —
        # error pages that might leak info or be framed).
        #
        #   • CSP: `'self'` for scripts + connect, images from our own
        #     origin + the MAL / MangaDex CDNs the UI legitimately
        #     loads, data: URIs for inline SVG/favicons. `'unsafe-inline'`
        #     on script-src is needed for the theme/language bootstrap
        #     in index.html (those run BEFORE React hydration — moving
        #     them out would FOUC). Consider tightening with a nonce
        #     on a future pass if the inline bootstrap disappears.
        #   • HSTS: 1-year, includeSubDomains. Preload NOT set — opt in
        #     separately at hstspreload.org if you want it.
        #   • Referrer-Policy: strict-origin-when-cross-origin mirrors
        #     the backend's policy. Keeps full URL off third-party logs.
        #   • X-Content-Type-Options: nosniff — browsers won't MIME-
        #     guess scripts out of non-script responses.
        #   • X-Frame-Options: DENY — defence-in-depth alongside CSP
        #     frame-ancestors 'none'. The SPA is never meant to embed.
        # `${FRONTEND_UMAMI_ORIGIN}` and `${FRONTEND_OBSERVABILITY_ORIGIN}`
        # are substituted by docker-entrypoint.sh at container startup —
        # both empty when their respective integrations aren't configured
        # (the tokens become harmless empty strings in the directive).
        #
        # When set:
        #   • Umami origin is allow-listed for both `script-src` (the
        #     analytics client script load) and `connect-src` (the
        #     pageview POSTs).
        #   • Observability origin (Sentry cloud / self-host / Bugsink —
        #     mutex-enforced server-side) is allow-listed only for
        #     `connect-src`. The SDK itself is bundled with the app and
        #     served from 'self', so script-src doesn't need it.
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' ${FRONTEND_UMAMI_ORIGIN}; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://cdn.myanimelist.net https://uploads.mangadex.org https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com; connect-src 'self' wss: https://api.jikan.moe https://api.mangadex.org https://graphql.anilist.co https://www.googleapis.com ${FRONTEND_UMAMI_ORIGIN} ${FRONTEND_OBSERVABILITY_ORIGIN}; font-src 'self' data: https://fonts.gstatic.com; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
            always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), interest-cohort=()" always;

        location /health {
            add_header Content-Type text/plain;
            return 200 'OK';
        }

        # Backend paths must NEVER be served by this nginx, even if the
        # reverse proxy upstream falls back here (e.g. the backend container
        # is down and Traefik's PathPrefix(`/api`) route is removed, leaving
        # only the client's catch-all rule). Without this block, nginx would
        # happily serve `index.html` with 200 OK via the SPA fallback below,
        # masking the backend outage from the frontend's connectivity probe.
        # 502 reflects reality: upstream is unreachable.
        location ~ ^/(api|auth)(/|$) {
            default_type application/json;
            return 502 '{"error":"Backend unreachable"}';
        }

        # Vite emits hashed filenames under /assets/ — they're immutable, so
        # tell the browser to cache them for a year and skip revalidation.
        location ~* ^/assets/.+\.(?:js|mjs|css|woff2?|ttf|eot|otf|jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Service worker & manifest must NOT be cached long — workbox updates
        # on every deploy and we want clients to pick it up on next load.
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location = /registerSW.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location = /manifest.webmanifest {
            add_header Cache-Control "no-cache";
        }

        # index.html is the entrypoint for SPA routing — never cache it so
        # the user picks up new asset hashes immediately after a deploy.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
