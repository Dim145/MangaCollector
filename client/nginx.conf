events{}

http {
    include /etc/nginx/mime.types;

    # Nginx doesn't know about webmanifest by default — add it explicitly so
    # PWA manifests ship with the right Content-Type.
    types {
        application/manifest+json webmanifest;
    }

    # Gzip every text-ish resource. Alpine nginx ships without brotli; gzip
    # already cuts ~70% off JS/CSS at comp_level 6.
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        application/rss+xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location /health {
            add_header Content-Type text/plain;
            return 200 'OK';
        }

        # Vite emits hashed filenames under /assets/ — they're immutable, so
        # tell the browser to cache them for a year and skip revalidation.
        location ~* ^/assets/.+\.(?:js|mjs|css|woff2?|ttf|eot|otf|jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Service worker & manifest must NOT be cached long — workbox updates
        # on every deploy and we want clients to pick it up on next load.
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location = /registerSW.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }
        location = /manifest.webmanifest {
            add_header Cache-Control "no-cache";
        }

        # index.html is the entrypoint for SPA routing — never cache it so
        # the user picks up new asset hashes immediately after a deploy.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
