[package]
name = "manga-collector-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "manga-collector-server"
path = "src/main.rs"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["multipart", "macros"] }
axum-extra = { version = "0.9", features = ["cookie", "typed-header"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Sessions
tower-sessions = "0.13"
tower-sessions-sqlx-store = { version = "0.14", features = ["postgres"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono", "rust_decimal"] }
sea-orm = { version = "1", features = ["sqlx-postgres", "runtime-tokio-rustls", "macros", "with-chrono", "with-rust_decimal"] }

# OAuth / OIDC
openidconnect = { version = "3.5", features = ["reqwest"] }

# HTTP client (MAL API)
reqwest = { version = "0.12", features = ["json"] }

# S3 / MinIO
aws-sdk-s3 = "1.43"
aws-credential-types = { version = "1.2", features = ["hardcoded-credentials"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Decimal for price
rust_decimal = { version = "1.35", features = ["serde-with-str"] }

# Environment config
dotenvy = "0.15"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async trait
async-trait = "0.1"

# Bytes / futures
bytes = "1"
futures = "0.3"

# HTTP types
http = "1"

# URL building
url = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
