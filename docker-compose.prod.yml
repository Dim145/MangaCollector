version: '3.9'

networks:
  ip6net:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default

services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    networks:
      - ip6net

  client:
    build: ./client
    ports:
      - "5173:5173"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=16m
    # FRONTEND_* env vars are read by docker-entrypoint.sh and templated
    # into index.html + nginx.conf at startup. Set them at the host
    # level (or via an env_file) and they pass through automatically.
    environment:
      - FRONTEND_UMAMI_SCRIPT_URL=${FRONTEND_UMAMI_SCRIPT_URL:-}
      - FRONTEND_UMAMI_WEBSITE_ID=${FRONTEND_UMAMI_WEBSITE_ID:-}
      - FRONTEND_UMAMI_ORIGIN=${FRONTEND_UMAMI_ORIGIN:-}
      - FRONTEND_SENTRY_DSN=${FRONTEND_SENTRY_DSN:-}
      - FRONTEND_BUGSINK_DSN=${FRONTEND_BUGSINK_DSN:-}
